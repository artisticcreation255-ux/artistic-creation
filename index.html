<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        header p {
            color: var(--accent);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 1rem 0;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .card-img {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            background-color: #334155;
        }

        .card-body {
            padding: 1.5rem;
        }

        .card-body h3 {
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }

        .card-body p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .loading, .error-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .error-msg {
            color: #ef4444;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Portfolio Projects</h1>
            <p>Live updates from Google Sheets</p>
        </header>

        <!-- Google Sheet එකෙන් එන ප්‍රොජෙක්ට්ස් වැටෙන්නේ මෙතනට -->
        <div class="grid" id="sheet-projects">
            <div class="loading">Loading amazing projects...</div>
        </div>
    </div>

    <!-- Google Sheet එකෙන් 100% වැඩ කරන JSON ක්‍රමයට දත්ත ගන්නා JavaScript එක -->
    <script>
        // ඔයාගේ Google Sheet ID එක මෙතනට සෙට් කරලා තියෙන්නේ
        const sheetId = '1fTLadWxaaJVlXYJTREH0eTQz0wzSP5InndZTlwb8Hf0'; 
        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        async function fetchSheetData() {
            const grid = document.getElementById('sheet-projects');
            try {
                const response = await fetch(base);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const text = await response.text();
                
                // Google JSON වල මුලින් එන අනවශ්‍ය text කෑල්ල (google.visualization.Query.setResponse...) අයින් කරනවා
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const json = JSON.parse(jsonString);
                
                const rows = json.table.rows;
                grid.innerHTML = ''; // Loading text එක අයින් කරනවා

                if (!rows || rows.length === 0) {
                    grid.innerHTML = '<div class="loading">No projects found. Please add some data to your Sheet starting from Row 2!</div>';
                    return;
                }

                rows.forEach(row => {
                    // ශීට් එකේ තියෙන Column වල දත්ත ගන්නවා (A=0, B=1, C=2)
                    const title = row.c[0] ? row.c[0].v : '';
                    const description = row.c[1] ? row.c[1].v : '';
                    // රූපයක් නැත්නම් වැටෙන්න Default ප්ලේස්හෝල්ඩර් ඉමේජ් එකක් දාලා තියෙන්නේ
                    const image = row.c[2] ? row.c[2].v : 'https://images.unsplash.com/photo-1541462608141-ad4979e408c9?q=80&w=600';

                    // Title එකක් තියෙනවා නම් විතරක් Card එකක් හදනවා
                    if (title) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-img" style="background-image: url('${image}');"></div>
                            <div class="card-body">
                                <h3>${title}</h3>
                                <p>${description}</p>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (error) {
                grid.innerHTML = '<div class="error-msg">Error loading projects. Please double-check your Sheet Share settings!</div>';
                console.error("Error details:", error);
            }
        }

        // පේජ් එක ලෝඩ් වෙද්දීම Function එක රන් කරනවා
        fetchSheetData();
    </script>
</body>
</html>
